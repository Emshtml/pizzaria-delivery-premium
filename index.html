<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pizzaria Delivery Premium</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body><header class="header">

  <section class="delivery" id="delivery">
    <div class="container delivery-box">
      <div>
        <h2>Delivery rápido</h2>
        <p>
          Entregamos em toda a região com rapidez e qualidade.
        </p>
      </div>

      <div class="delivery-info">
        <div>
          <strong>⏰ Tempo médio</strong>
          <span>30-45 min</span>
        </div>

        <div>
          <strong>📍 Atendimento</strong>
          <span>São Paulo - SP</span>
        </div>
      </div>
    </div>
  </section>

  <footer id="contato">
    <div class="container footer-content">
      <div>
        <h3>PizzaPrime</h3>
        <p>Experiência premium em delivery.</p>
      </div>

      <div>
        <p>📞 (11) 99999-9999</p>
        <p>📍 São Paulo - SP</p>
      </div>
    </div>
  </footer>

  <div class="cart-modal" id="cartModal">
    <div class="cart-content">
      <div class="cart-header">
        <h2>Seu Pedido</h2>
        <button id="closeCart">✖</button>
      </div>

      <div id="cartItems"></div>

      <div class="cart-footer">
        <h3>Total: R$ <span id="cartTotal">0.00</span></h3>

        <button class="btn-whatsapp" id="finishOrder">
          Finalizar Pedido
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
